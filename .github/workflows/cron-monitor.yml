name: Cron Monitor Heartbeat
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cron Health Check
        run: |
          curl -X POST https://rk-cron-monitor.vercel.app/api/check \
          -H "Content-Type: application/json" \
          -d '{
            "job_name": "github-action-heartbeat",
            "cron_expression": "*/5 * * * *",
            "last_run_timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"
          }'
